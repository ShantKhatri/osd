name: Redeploy on Strapi Update

on:
  repository_dispatch:
    types: [strapi-update]

  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make empty commit
        run: |
          git config --global user.name "OSW Bot"
          git config --global user.email "bot@opensourceweekend.org"
          git commit --allow-empty -m "Trigger rebuild from Strapi webhook"

      - name: Push commit
        run: git push
